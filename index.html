<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakaya na área</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c2f33;
            color: #ffffff;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #7289da;
        }
        .container {
            background-color: #23272a;
            border-radius: 8px;
            padding: 30px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 90%;
        }
        .link-btn {
            display: block;
            background-color: #7289da;
            color: white;
            padding: 15px 25px;
            margin: 15px 0;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .link-btn:hover {
            background-color: #5b73c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nakaya na área</h1>
        <p>Clique em um dos botões abaixo para entrar no servidor:</p>
        
        <!-- Links corrigidos para abrir direto no mesmo app/aba -->
        <a class="link-btn" href="https://discord.gg/AmMuQ3SNq">Entrar no Servidor 1</a>
        <a class="link-btn" href="https://discord.gg/QEDn9DD6y">Entrar no Servidor 2</a>
        <a class="link-btn" href="https://discord.gg/platformdestroyer">Entrar no Servidor 3</a>
    </div>

</body>
</html>

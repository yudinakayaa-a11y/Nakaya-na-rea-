<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakaya na área</title>
    <style>
        /* Fundo escuro igual ao app do Discord */
        body {
            font-family: 'Whitney', 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f1115;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }

        /* Animação para fazer as bordas piscarem em branco */
        @keyframes brilhoPiscando {
            0% {
                box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
                border-color: rgba(255, 255, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 35px rgba(255, 255, 255, 0.9);
                border-color: rgba(255, 255, 255, 1);
            }
            100% {
                box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
                border-color: rgba(255, 255, 255, 0.3);
            }
        }

        /* Caixa principal com o efeito piscante neon nos cantos/bordas */
        .container {
            background: rgba(32, 34, 37, 0.95);
            border-radius: 16px;
            padding: 40px 30px;
            display: inline-block;
            max-width: 400px;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: brilhoPiscando 2s infinite ease-in-out;
        }

        /* Título com o degradê do Nitro */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff007f, #8a2be2, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            color: #b9bbbe;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Botão 1: Roxo Neon Vibrante */
        .btn-roxo {
            display: block;
            background: linear-gradient(135deg, #8a2be2, #4a00e0);
            color: white;
            padding: 16px 20px;
            margin: 20px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-roxo:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.8);
        }

        /* Botão 2: Azul Cyber Ciano */
        .btn-azul {
            display: block;
            background: linear-gradient(135deg, #00d2ff, #0066ff);
            color: white;
            padding: 16px 20px;
            margin: 20px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-azul:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.8);
        }

        /* Botão 3: Verde Limão / Neon */
        .btn-verde {
            display: block;
            background: linear-gradient(135deg, #00ff87, #60efff);
            color: #0f1115;
            padding: 16px 20px;
            margin: 20px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-verde:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(0, 255, 135, 0.8);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nakaya na área</h1>
        <p>Escolha o seu servidor e entre no pique do Nitro:</p>
        
        <!-- Links alterados para forçar a abertura do aplicativo do Discord -->
        <a class="btn-roxo" href="discord://discord.gg/AmMuQ3SNq">Entrar no Servidor 1</a>
        <a class="btn-azul" href="discord://discord.gg/QEDn9DD6y">Entrar no Servidor 2</a>
        <a class="btn-verde" href="discord://discord.gg/platformdestroyer">Entrar no Servidor 3</a>
    </div>

</body>
</html>

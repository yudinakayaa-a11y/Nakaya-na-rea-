<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakaya na área</title>
    <style>
        /* Fundo escuro igual ao app do Discord */
        body {
            font-family: 'Whitney', 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f1115;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }

        /* Caixa principal com efeito de vidro e borda neon */
        .container {
            background: rgba(32, 34, 37, 0.85);
            border-radius: 16px;
            padding: 40px 30px;
            display: inline-block;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            border: 2px solid #8a2be2;
        }

        /* Título com o degradê clássico do Nitro */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff007f, #8a2be2, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            color: #b9bbbe;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Botão 1: Roxo Neon Vibrante */
        .btn-roxo {
            display: block;
            background: linear-gradient(135deg, #8a2be2, #4a00e0);
            color: white;
            padding: 16px 20px;
            margin: 20px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-roxo:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.8);
        }

        /* Botão 2: Azul Cyber Ciano */
        .btn-azul {
            display: block;
            background: linear-gradient(135deg, #00d2ff, #0066ff);
            color: white;
            padding: 16px 20px;
            margin: 20px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-azul:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.8);
        }

        /* Botão 3: Verde Limão / Neon */
        .btn-verde {
            display: block;
            background: linear-gradient(135deg, #00ff87, #60efff);
            color: #0f1115; /* Texto escuro para dar contraste no verde brilhante */
            padding: 16px 20px;
            margin: 20px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-verde:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(0, 255, 135, 0.8);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nakaya na área</h1>
        <p>Escolha o seu servidor e entre no pique do Nitro:</p>
        
        <!-- Botões com as novas cores estilosas -->
        <a class="btn-roxo" href="https://discord.gg">Entrar no Servidor 1</a>
        <a class="btn-azul" href="https://discord.gg">Entrar no Servidor 2</a>
        <a class="btn-verde" href="https://discord.gg">Entrar no Servidor 3</a>
    </div>

</body>
</html>
